<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velvet Vogue | Contact</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: #0b0b0b;
      color: #fff;
    }

    .container {
      max-width: 1000px;
      margin: 50px auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
      line-height: 1.6;
    }

    .card {
      background: #111;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.6);
    }

    form .field {
      display: flex;
      flex-direction: column;
      margin-bottom: 15px;
    }

    label {
      font-size: 14px;
      margin-bottom: 5px;
      color: #ddd;
    }

    input, textarea {
      background: #1a1a1a;
      border: none;
      padding: 12px;
      border-radius: 8px;
      color: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    button {
      margin-top: 10px;
      padding: 12px 18px;
      background: #fff;
      border: none;
      color: #000;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #ddd;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .contact-item i {
      background: #1a1a1a;
      padding: 12px;
      border-radius: 8px;
      color: #fff;
    }

    .socials {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }

    .socials a {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Contact Form -->
    <div class="card">
      <h1>Contact Us</h1>
      <p>We’d love to hear from you! Fill out the form below and our Velvet Vogue team will get back to you.</p>
      <form>
        <div class="field">
          <label for="name">Your Name</label>
          <input type="text" id="name" placeholder="Enter your name">
        </div>
        <div class="field">
          <label for="email">Your Email</label>
          <input type="email" id="email" placeholder="Enter your email">
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" placeholder="Write your message here..."></textarea>
        </div>
        <button type="submit">Send Message</button>
      </form>
    </div>

    <!-- Contact Info -->
    <div class="card contact-info">
      <div class="contact-item">
        <i class="fa-solid fa-location-dot"></i>
        <span>123 Velvet Street, Colombo, Sri Lanka</span>
      </div>
      <div class="contact-item">
        <i class="fa-solid fa-phone"></i>
        <span>+94 77 123 4567</span>
      </div>
      <div class="contact-item">
        <i class="fa-solid fa-envelope"></i>
        <span>support@velvetvogue.com</span>
      </div>
      <div class="socials">
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
      </div>
    </div>
  </div>
</body>
</html>
